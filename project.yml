# XcodeGen project spec. The .xcodeproj is generated from this file —
# don't check the .xcodeproj into git. Run `xcodegen generate` on macOS
# before opening in Xcode.
name: AiveraEcho

options:
  bundleIdPrefix: solutions.aivera.echo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  # No xcodeVersion pin — let XcodeGen target whatever the local toolchain is.

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0

targets:
  AiveraEcho:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - package: GRDB
      - package: Supabase
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseAnalytics
    sources:
      - path: Sources/AiveraEcho
    resources:
      - path: Resources
        optional: true
    # NB: we deliberately do NOT use XcodeGen's `info` block. That block
    # writes/merges into the Info.plist at generate time and was silently
    # dropping CFBundleIconName, causing App Store Connect to reject every
    # upload. INFOPLIST_FILE is set in the per-target settings.base below
    # so xcodebuild copies our committed Info.plist verbatim.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: solutions.aivera.echo
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_FILE: Sources/AiveraEcho/Info.plist
        # Disable signing for CI / Simulator builds; Xcode applies dev signing locally.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
