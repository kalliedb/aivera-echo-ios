# XcodeGen project spec. The .xcodeproj is generated from this file —
# don't check the .xcodeproj into git. Run `xcodegen generate` on macOS
# before opening in Xcode.
name: AiveraEcho

options:
  bundleIdPrefix: solutions.aivera.echo
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  # No xcodeVersion pin — let XcodeGen target whatever the local toolchain is.

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0

targets:
  AiveraEcho:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    dependencies:
      - package: GRDB
      - package: Supabase
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseAnalytics
    sources:
      - path: Sources/AiveraEcho
    resources:
      - path: Resources
        optional: true
    info:
      path: Sources/AiveraEcho/Info.plist
      properties:
        CFBundleDisplayName: Aivera Echo
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Required for iOS 11+ apps that ship icons via asset catalog.
        # Without this key, App Store Connect validation rejects the upload
        # with "Missing required icon file" because the bundle has no entry
        # pointing actool's generated icons to a catalog set.
        CFBundleIconName: AppIcon
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Aivera Echo needs your microphone to record voice reminders."
        NSSpeechRecognitionUsageDescription: "Echo uses on-device speech recognition to turn your voice into reminders."
        NSLocationWhenInUseUsageDescription: "Echo uses your location for place-based reminders."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Echo uses your location in the background to trigger place-based reminders even when the app is closed."
        # Supabase project URL + anon (publishable) key. Anon key is designed
        # to be public-safe (RLS protects the data); committing it is fine.
        # If you ever rotate the key, just update it here.
        SUPABASE_URL: "https://rnoofzjmoalcdygksvos.supabase.co"
        SUPABASE_ANON_KEY: "sb_publishable_CSuu1uf-VdoMyBxIn6J2IA_7xTW67c_"
        UIBackgroundModes:
          - audio
          - location
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: solutions.aivera.echo
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        # Disable signing for CI / Simulator builds; Xcode applies dev signing locally.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
