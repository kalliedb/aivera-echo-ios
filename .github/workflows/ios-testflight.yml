name: iOS TestFlight

# Cut a TestFlight build by pushing a tag like v1.0.0-tf1:
#   git tag v1.0.0-tf1 && git push origin v1.0.0-tf1
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # also allow manual runs from the Actions tab

jobs:
  testflight:
    name: Build + upload to TestFlight
    # Pin the macos-26 (Tahoe) image explicitly — macos-latest still maps to
    # macos-15 (Xcode 16.4 / iOS 18.5 SDK) on GitHub Actions, and Apple now
    # requires iOS 26 SDK or later for App Store Connect submissions. The
    # explicit Xcode selection step below picks Xcode 26 if multiple are
    # installed on the image.
    runs-on: macos-26
    timeout-minutes: 60

    env:
      ASC_KEY_ID:    ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8:    ${{ secrets.ASC_KEY_P8 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      # Keychain is created in the Fastfile via create_keychain — no env vars needed.
      FASTLANE_HIDE_CHANGELOG: "true"
      # Default is 3s × 4 retries which times out on a fresh runner while SPM
      # resolves Firebase + Supabase + GRDB. Give it a real budget.
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "180"
      FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Xcode installations
        # Apple's validator requires Xcode 26+ (iOS 26 SDK). On macos-26 we
        # expect /Applications/Xcode_26.x.app — list every Xcode so the log
        # tells us what's actually here if the build picks the wrong one.
        run: |
          echo "--- Installed Xcode versions ---"
          ls -1 /Applications/ | grep -i '^Xcode' || true
          echo "--- xcode-select default ---"
          xcode-select -p
          echo "--- xcodebuild -version ---"
          xcodebuild -version

      - name: Select Xcode 26
        # macos-26 may have multiple Xcodes installed; force Xcode 26 even if
        # the image's default symlink still points at an older one. Pick the
        # highest-numbered Xcode_26* available (handles patch versions).
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_26" ]; then
            echo "::error::No Xcode 26 found on the runner. Available:"
            ls -1 /Applications/ | grep -i '^Xcode' || true
            exit 1
          fi
          echo "Selecting $XCODE_26"
          sudo xcode-select -s "$XCODE_26/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Pre-render AppIcon sizes from icon-1024.png
        # Apple's App Store validator (altool) checks for the icons inside the
        # IPA, regardless of asset-catalog auto-generation. We pre-render every
        # legacy size with macOS's built-in `sips` so actool just embeds the
        # files as-is — no reliance on its single-1024-universal expansion.
        run: |
          cd Resources/Assets.xcassets/AppIcon.appiconset
          for size in 20 29 40 58 60 80 87 120 152 167 180; do
            sips -s format png -z "$size" "$size" icon-1024.png --out "icon-$size.png"
          done
          ls -la

      - name: Set up Ruby + fastlane (bundler)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # The Gemfile lists multi_json/rexml/json explicitly so bundler's
          # frozen-mode check doesn't choke on fastlane's transitive requires.
          bundler-cache: true

      - name: Build + upload to TestFlight
        run: bundle exec fastlane ios beta
