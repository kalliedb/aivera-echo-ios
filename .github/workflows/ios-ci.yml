name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# GitHub-hosted macOS runners get free minutes on public repos; for private
# repos every minute costs 10x of a Linux minute. Build is light, ~2-3 min.
jobs:
  build:
    name: Build for Simulator
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate --use-cache

      - name: Resolve Swift packages (none yet)
        run: |
          # Will become meaningful once we add SPM deps (supabase-swift, GRDB).
          xcodebuild -resolvePackageDependencies \
            -project AiveraEcho.xcodeproj -scheme AiveraEcho || true

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project AiveraEcho.xcodeproj \
            -scheme AiveraEcho \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

      - name: Summary
        if: success()
        run: |
          echo "::notice::Aivera Echo iOS build succeeded"
          echo "Bundle: solutions.aivera.echo"
          echo "Min iOS: 16.0"
