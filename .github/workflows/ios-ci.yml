name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build for Simulator
    # macos-15 ships Xcode 16+ — matches the project format that current XcodeGen emits.
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate --use-cache

      - name: Resolve Swift packages (none yet)
        run: |
          # Will become meaningful once we add SPM deps (supabase-swift, GRDB).
          xcodebuild -resolvePackageDependencies \
            -project AiveraEcho.xcodeproj -scheme AiveraEcho || true

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project AiveraEcho.xcodeproj \
            -scheme AiveraEcho \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

      - name: Summary
        if: success()
        run: |
          echo "::notice::Aivera Echo iOS build succeeded"
          echo "Bundle: solutions.aivera.echo"
          echo "Min iOS: 16.0"
